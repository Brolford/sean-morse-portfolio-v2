<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Define a simple leaf shape: starts at (0,0), points upwards to (0,-16), with a width of 5 -->
    <path id="leaf" d="M0,0 Q-2.5,-8 0,-16 Q2.5,-8 0,0 Z" />
  </defs>

  <!-- Group all elements and center them in the viewBox -->
  <g transform="translate(100,100)">
    <!-- Outer Ring Border -->
    <circle r="95" fill="none" stroke="#C4541A" stroke-width="2"/>

    <!-- Left Wreath Decoration (seven leaves) -->
    <g fill="#C4541A">
      <use href="#leaf" transform="rotate(-30) translate(0, -70)"/>
      <use href="#leaf" transform="rotate(-45) translate(0, -70)"/>
      <use href="#leaf" transform="rotate(-60) translate(0, -70)"/>
      <use href="#leaf" transform="rotate(-75) translate(0, -70)"/>
      <use href="#leaf" transform="rotate(-90) translate(0, -70)"/>
      <use href="#leaf" transform="rotate(-105) translate(0, -70)"/>
      <use href="#leaf" transform="rotate(-120) translate(0, -70)"/>
    </g>

    <!-- Right Wreath Decoration (seven leaves) -->
    <g fill="#C4541A">
      <use href="#leaf" transform="rotate(30) translate(0, -70)"/>
      <use href="#leaf" transform="rotate(45) translate(0, -70)"/>
      <use href="#leaf" transform="rotate(60) translate(0, -70)"/>
      <use href="#leaf" transform="rotate(75) translate(0, -70)"/>
      <use href="#leaf" transform="rotate(90) translate(0, -70)"/>
      <use href="#leaf" transform="rotate(105) translate(0, -70)"/>
      <use href="#leaf" transform="rotate(120) translate(0, -70)"/>
    </g>

    <!-- Center Content: #1 -->
    <text x="0" y="-10" text-anchor="middle" font-family="serif" fill="#C4541A">
      <tspan font-size="60" font-weight="bold">#1</tspan>
    </text>

    <!-- Center Content: DIELINE AWARD -->
    <text x="0" y="30" text-anchor="middle" font-family="serif" fill="#C4541A" font-size="20">
      DIELINE AWARD
    </text>

    <!-- Center Content: Dairy Category · 2023 -->
    <text x="0" y="55" text-anchor="middle" font-family="serif" fill="#C4541A" font-size="12">
      Dairy Category &middot; 2023
    </text>

  </g>
</svg>