<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <!-- Outer ring -->
  <circle cx="100" cy="100" r="95" stroke="#C4541A" stroke-width="1.5"/>
  <circle cx="100" cy="100" r="90" stroke="#C4541A" stroke-width="0.3" opacity="0.3"/>

  <!-- Inner ring accent -->
  <circle cx="100" cy="100" r="82" stroke="#C4541A" stroke-width="0.3" opacity="0.2"/>

  <!-- Upward arrow / growth mark -->
  <g stroke="#C4541A" stroke-width="1.2" opacity="0.4">
    <line x1="100" y1="52" x2="100" y2="38"/>
    <polyline points="94,44 100,38 106,44" fill="none"/>
  </g>

  <!-- $320M+ -->
  <text x="100" y="85" text-anchor="middle" font-family="Georgia, serif" font-weight="400" font-size="32" fill="#C4541A">$320M+</text>

  <!-- Divider -->
  <line x1="60" y1="95" x2="140" y2="95" stroke="#C4541A" stroke-width="0.5" opacity="0.3"/>

  <!-- REVENUE -->
  <text x="100" y="114" text-anchor="middle" font-family="Georgia, serif" font-weight="400" font-size="12" fill="#C4541A" letter-spacing="4">REVENUE</text>

  <!-- INFLUENCED -->
  <text x="100" y="130" text-anchor="middle" font-family="Georgia, serif" font-weight="400" font-size="12" fill="#C4541A" letter-spacing="4">INFLUENCED</text>

  <!-- Divider -->
  <line x1="75" y1="140" x2="125" y2="140" stroke="#C4541A" stroke-width="0.3" opacity="0.3"/>

  <!-- 15+ Brands -->
  <text x="100" y="158" text-anchor="middle" font-family="Georgia, serif" font-weight="400" font-size="9" fill="#C4541A" opacity="0.5" letter-spacing="1.5">ACROSS 15+ BRANDS</text>

  <!-- Bottom decorative dots -->
  <g fill="#C4541A" opacity="0.25">
    <circle cx="90" cy="170" r="1.5"/>
    <circle cx="100" cy="170" r="1.5"/>
    <circle cx="110" cy="170" r="1.5"/>
  </g>
</svg>
